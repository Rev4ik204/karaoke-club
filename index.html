<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Karaoke Club</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <a href="#" class="logo_link">
          <img src="./images/svg/logo_02_1_293x67.svg" alt="logo_icon" class="logo_icon">
        </a>
        <div class="header_contact_box">

          <a href="tel:+380937655023" class="tell_box">
            <div class="svg_block">
              <svg>
                <use href="./images/spriteSvg.svg#icon-icons8_shake_phone"></use>
              </svg>
            </div>
            <p class="tell_text">380 (93) 765-50-23</p>
          </a>
          <a href="#" class="location_box">
            <div class="svg_block">
              <svg>
                <use
                href="./images/spriteSvg.svg#icon-icons8_marker_1_34x34"
                ></use>
              </svg>
            </div>
            <p class="location_text">м. Лубянка</p>
          </a>
        </div>
        <div class="header_btn_box">

          <button class="our_hall_btn">Наши залы</button>
          <button class="reserve_btn">Забронировать</button>
        </div>
      </div>
    </header>
    <main class="main">
      <section class="hero">
        <div class="container">
          <h1 class="hero_title">Арендуй Караоке-Зал до 10 человек</h1>
          <p class="hero_pre_title">возьми алкоголь и еду с собой</p>
          <ul class="hero_benefits_list">
            <li class="hero_benefits_item">
              <div class="hero_svg_block">
                <svg>
                  <use
                    href="./images/spriteSvg.svg#icon-icons8_verified_account_1_50x50"
                  ></use>
                </svg>
              </div>
              <p class="hero_benefits_text">Если хочешь попеть и оторваться</p>
            </li>
            <li class="hero_benefits_item">
              <div class="hero_svg_block">
                <svg>
                  <use
                    href="./images/spriteSvg.svg#icon-icons8_verified_account_1_50x50"
                  ></use>
                </svg>
              </div>
              <p class="hero_benefits_text">Отдохнуть после работы</p>
            </li>
            <li class="hero_benefits_item">
              <div class="hero_svg_block">
                <svg>
                  <use
                    href="./images/spriteSvg.svg#icon-icons8_verified_account_1_50x50"
                  ></use>
                </svg>
              </div>
              <p class="hero_benefits_text">Хорошо провести время</p>
            </li>
          </ul>
          <p class="lock">м. Лубянка</p>
          <button class="hero_btn">Забронировать онлайн</button>
          <div class="hero_rectangle29"></div>
          <picture>
            <source
              srcset="./images/img/harizmahall1-3_1_1024x685.avif"
              type="image/avif"
            />
            <source
              srcset="./images/img/harizmahall1-3_1_1024x685.webp"
              type="image/webp"
            />
            <img
              class="harizmahall_img"
              src="./images/img/harizmahall1-3_1_1024x685.png"
              alt="harizmahall_img"
            />
          </picture>
          <div class="hero_img">
            <picture>
              <source
                srcset="./images/img/dancer_PNG111_1_700x1247.avif"
                type="image/avif"
              />
              <source
                srcset="./images/img/dancer_PNG111_1_700x1247.webp"
                type="image/webp"
              />
              <img
                class="dancer_img"
                src="./images/img/dancer_PNG111_1_700x1247.png"
                alt="dancer_img"
              />
            </picture>
            <picture>
              <source
                srcset="./images/img/klipartz_3_167x624.avif"
                type="image/avif"
              />
              <source
                srcset="./images/img/klipartz_3_167x624.webp"
                type="image/webp"
              />
              <img
                class="mic_img"
                src="./images/img/klipartz_3_167x624.png"
                alt="mic_img"
              />
            </picture>
            <p class="scrole_bottom">Листайте вниз</p>
            <a class="hero_contact_block" href="#">
              <button class="telegram_btn">
                <svg>
                  <use
                    href="./images/spriteSvg.svg#icon-icons8_telegram_app_1_35x35"
                  ></use>
                </svg>
              </button>
              <p class="hero_contact_text">Связаться с нами</p>
            </a>
            <div></div>
          </div>
        </div>
      </section>
      <section class="venues">
        <div class="container"></div>
      </section>
      <section class="advantages">
        <div class="container"></div>
      </section>
      <section class="reserv">
        <div class="container"></div>
      </section>
      <section class="FAQ">
        <div class="container"></div>
      </section>
    </main>
    <div class="container"></div>
    <footer class="footer">
      <div class="container"></div>
    </footer>
  </body>
</html>
